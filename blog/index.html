<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Hub | 李文昊的个人博客</title>
    <meta name="description" content="李文昊的个人博文中心。记录人工智能、Python、计算机基础、项目开发与个人成长。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="./blog.css">
</head>
<body>
    <!-- Radial Glow Background Accents -->
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>
    <div class="grid-background"></div>

    <!-- Navigation Header -->
    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo" id="logo-link">
                <span>W</span><span class="logo-dot">.</span><span>L</span>
            </a>
            
            <span class="navbar-title">Blog Hub</span>
            
            <div class="nav-controls">
                <a href="../index.html" class="btn-nav-back" style="display: inline-flex; align-items: center; gap: 0.35rem; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 0.4rem 0.8rem; border-radius: 20px; border: 1px solid var(--border); transition: all 0.3s; margin-right: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    <span>返回首页</span>
                </a>
                
                <!-- Theme Toggle Button -->
                <button class="theme-toggle" id="theme-toggle" aria-label="切换浅色模式">
                    <!-- Sun Icon -->
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <!-- Moon Icon -->
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Wrapper -->
    <main class="blog-content-wrapper">
        <div class="blog-hub-container">
            <!-- 1. Hero Block -->
            <section class="blog-hero">
                <h1 class="hero-title">Blog / <span class="highlight">学习与开发日志</span></h1>
                <p class="hero-subtitle">记录人工智能、Python、计算机基础、项目开发与个人成长。</p>
            </section>

            <!-- 2. Category Cards Section -->
            <section class="category-section">
                <div class="section-title-wrapper">
                    <h2 class="hub-section-title">文章分类 / Categories</h2>
                </div>
                <div class="category-grid" id="categoryGrid">
                    <!-- Categories will be rendered dynamically by blog.js -->
                </div>
            </section>

            <!-- 3. Search & Filter Bar -->
            <section class="filter-section">
                <div class="filter-bar">
                    <div class="search-box-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" class="search-input" id="searchInput" placeholder="Search posts / 搜索文章">
                    </div>
                    <div class="filter-chips" id="filterChips">
                        <button class="filter-chip active" data-category="all">All</button>
                        <button class="filter-chip" data-category="ai-learning">AI Learning</button>
                        <button class="filter-chip" data-category="python-notes">Python Notes</button>
                        <button class="filter-chip" data-category="cs-fundamentals">CS Fundamentals</button>
                        <button class="filter-chip" data-category="project-logs">Project Logs</button>
                        <button class="filter-chip" data-category="study-roadmap">Study Roadmap</button>
                        <button class="filter-chip" data-category="life-reflection">Life & Reflection</button>
                    </div>
                </div>
            </section>

            <!-- 4. Posts Grid -->
            <section class="posts-section">
                <div class="section-title-wrapper">
                    <h2 class="hub-section-title" id="postsTitle">文章列表 / Articles</h2>
                </div>
                <div class="posts-grid" id="postsGrid">
                    <!-- Blog posts will be rendered dynamically by blog.js -->
                </div>
                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                    <p class="empty-text-cn">这个分类还没有文章，后续会持续更新。</p>
                    <p class="empty-text-en">No articles found in this category. We will keep posting updates.</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p class="copyright">&copy; 2026 李文昊. 保留所有权利。</p>
            <button class="back-to-top" id="back-to-top" aria-label="返回顶部">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="./blog-data.js"></script>
    <script src="./blog.js"></script>
</body>
</html>
